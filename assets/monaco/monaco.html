<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; }
  #container { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
</script>
<script>
  var editor;

  require(['vs/editor/editor.main'], function() {
    editor = monaco.editor.create(document.getElementById('container'), {
      value: '',
      language: 'dart',
      theme: 'vs-dark',
      fontSize: 13,
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      wordWrap: 'on',
      automaticLayout: true,
      lineNumbers: 'on',
      renderLineHighlight: 'line',
      cursorBlinking: 'blink',
      folding: true,
      tabSize: 2,
      insertSpaces: true,
    });

    monaco.editor.defineTheme('velox-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [],
      colors: {
        'editor.background': '#0d1117',
        'editor.foreground': '#cdd9e5',
        'editor.lineHighlightBackground': '#141b24',
        'editorLineNumber.foreground': '#546e7a',
        'editorLineNumber.activeForeground': '#00e5ff',
        'editor.selectionBackground': '#1e2d3d',
        'editorCursor.foreground': '#00e5ff',
      }
    });
    monaco.editor.setTheme('velox-dark');

    // Notify Flutter ready
    window.VeloxEditor && window.VeloxEditor.postMessage(JSON.stringify({ type: 'ready' }));

    // Send content changes to Flutter
    editor.onDidChangeModelContent(function() {
      const content = editor.getValue();
      window.VeloxEditor && window.VeloxEditor.postMessage(JSON.stringify({
        type: 'change',
        content: content
      }));
    });

    // Send cursor position to Flutter
    editor.onDidChangeCursorPosition(function(e) {
      window.VeloxEditor && window.VeloxEditor.postMessage(JSON.stringify({
        type: 'cursor',
        line: e.position.lineNumber,
        col: e.position.column
      }));
    });
  });

  // Called from Flutter
  window.setContent = function(content, language) {
    if (!editor) return;
    const model = editor.getModel();
    if (model) {
      monaco.editor.setModelLanguage(model, language || 'plaintext');
      editor.setValue(content);
    }
  };

  window.getContent = function() {
    return editor ? editor.getValue() : '';
  };

  window.setLanguage = function(lang) {
    if (editor) monaco.editor.setModelLanguage(editor.getModel(), lang);
  };

  window.insertText = function(text) {
    if (!editor) return;
    const selection = editor.getSelection();
    editor.executeEdits('', [{
      range: selection,
      text: text,
      forceMoveMarkers: true
    }]);
  };
</script>
</body>
</html>
