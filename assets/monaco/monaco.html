<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; }
  #container { width: 100%; height: 100%; }
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0d1117; color: #546e7a;
    font-family: monospace; font-size: 13px; gap: 12px;
    z-index: 9999;
  }
  #loading .spinner {
    width: 28px; height: 28px;
    border: 2px solid #1e2d3d;
    border-top-color: #00e5ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #error-msg {
    display: none; position: fixed; inset: 0;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    background: #0d1117; color: #cdd9e5;
    font-family: monospace; text-align: center; padding: 24px;
    z-index: 9999;
  }
  #error-msg .icon { font-size: 40px; }
  #error-msg p { color: #546e7a; font-size: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span>Loading editor…</span>
</div>
<div id="error-msg">
  <div class="icon">⚠️</div>
  <div>Editor requires internet access</div>
  <p>Monaco editor could not be loaded.<br>Please check your connection and try again.</p>
</div>
<div id="container"></div>
<script>
  // Load Monaco from CDN with a timeout fallback
  var MONACO_VERSION = '0.45.0';
  var CDN_BASE = 'https://cdn.jsdelivr.net/npm/monaco-editor@' + MONACO_VERSION + '/min/vs';

  var loadTimeout = setTimeout(function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
  }, 15000);

  var script = document.createElement('script');
  script.src = CDN_BASE + '/loader.js';
  script.onerror = function() {
    clearTimeout(loadTimeout);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = 'flex';
  };
  script.onload = function() {
    require.config({ paths: { vs: CDN_BASE } });
    require(['vs/editor/editor.main'], initEditor, function(err) {
      clearTimeout(loadTimeout);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'flex';
    });
  };
  document.head.appendChild(script);
</script>
<script>
  var editor;

  function initEditor() {
    clearTimeout(loadTimeout);

    editor = monaco.editor.create(document.getElementById('container'), {
      value: '',
      language: 'dart',
      theme: 'vs-dark',
      fontSize: 13,
      minimap: { enabled: false },
      scrollBeyondLastLine: false,
      wordWrap: 'on',
      automaticLayout: true,
      lineNumbers: 'on',
      renderLineHighlight: 'line',
      cursorBlinking: 'blink',
      folding: true,
      tabSize: 2,
      insertSpaces: true,
    });

    monaco.editor.defineTheme('velox-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [],
      colors: {
        'editor.background': '#0d1117',
        'editor.foreground': '#cdd9e5',
        'editor.lineHighlightBackground': '#141b24',
        'editorLineNumber.foreground': '#546e7a',
        'editorLineNumber.activeForeground': '#00e5ff',
        'editor.selectionBackground': '#1e2d3d',
        'editorCursor.foreground': '#00e5ff',
      }
    });
    monaco.editor.setTheme('velox-dark');

    document.getElementById('loading').style.display = 'none';

    // Send content changes to Flutter
    editor.onDidChangeModelContent(function() {
      var content = editor.getValue();
      notifyFlutter({ type: 'change', content: content });
    });

    // Send cursor position to Flutter
    editor.onDidChangeCursorPosition(function(e) {
      notifyFlutter({ type: 'cursor', line: e.position.lineNumber, col: e.position.column });
    });

    // Notify Flutter that editor is ready (retry in case channel isn't wired yet)
    (function notifyReady(attempt) {
      if (window.VeloxEditor) {
        window.VeloxEditor.postMessage(JSON.stringify({ type: 'ready' }));
      } else if (attempt < 20) {
        setTimeout(() => notifyReady(attempt + 1), 50);
      }
    })(0);
  }

  function notifyFlutter(obj) {
    window.VeloxEditor && window.VeloxEditor.postMessage(JSON.stringify(obj));
  }

  // Called from Flutter — set content and language
  window.setContent = function(content, language) {
    if (!editor) return;
    var model = editor.getModel();
    if (model) {
      monaco.editor.setModelLanguage(model, language || 'plaintext');
      editor.setValue(content);
    }
  };

  window.getContent = function() {
    return editor ? editor.getValue() : '';
  };

  window.setLanguage = function(lang) {
    if (editor) monaco.editor.setModelLanguage(editor.getModel(), lang);
  };

  window.insertText = function(text) {
    if (!editor) return;
    var selection = editor.getSelection();
    editor.executeEdits('', [{ range: selection, text: text, forceMoveMarkers: true }]);
  };

  window.insertAtCursor = function(text) {
    if (!editor) return;
    var position = editor.getPosition();
    var range = new monaco.Range(
      position.lineNumber, position.column,
      position.lineNumber, position.column
    );
    editor.executeEdits('ai-insert', [{ range: range, text: text, forceMoveMarkers: true }]);
    editor.focus();
  };
</script>
</body>
</html>
