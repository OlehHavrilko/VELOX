name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Generate Android scaffold
        run: |
          set -e
          flutter create --org com.velox --project-name velox /tmp/scaffold
          cp /tmp/scaffold/android/settings.gradle.kts android/settings.gradle.kts
          cp /tmp/scaffold/android/build.gradle.kts android/build.gradle.kts
          cp /tmp/scaffold/android/app/build.gradle.kts android/app/build.gradle.kts
          cp -r /tmp/scaffold/android/gradle android/
          if [ -f android/gradle.properties ]; then
            echo "" >> android/gradle.properties
          fi
          if [ -f /tmp/scaffold/android/gradle.properties ]; then
            cat /tmp/scaffold/android/gradle.properties >> android/gradle.properties
          fi
          if [ -z "${FLUTTER_ROOT:-}" ]; then
            echo "Error: FLUTTER_ROOT is not set" >&2
            exit 1
          fi
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          sed -i 's/com\.example\.velox/com.velox.app/g' android/app/build.gradle.kts
          sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle.kts

      - name: Download xterm.js assets
        run: |
          set -e
          mkdir -p assets/xterm
          curl -fL "https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" -o assets/xterm/xterm.js
          curl -fL "https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" -o assets/xterm/xterm.css
          if [ ! -f assets/xterm/xterm.js ] || [ ! -f assets/xterm/xterm.css ]; then
            echo "Error: xterm assets download failed" >&2
            exit 1
          fi

      - name: Create Monaco assets directory
        run: |
          set -e
          mkdir -p assets/monaco
          echo "Monaco assets directory created"

      - run: flutter pub get

      - run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: velox-release
          path: build/app/outputs/flutter-apk/app-release.apk
