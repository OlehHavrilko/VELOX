name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Verify and fix Gradle configuration
        run: |
          set -e
          
          # Check if settings.gradle.kts exists
          if [ ! -f android/settings.gradle.kts ]; then
            echo "Creating settings.gradle.kts..."
            cat > android/settings.gradle.kts << 'EOF'
pluginManagement {
    val flutterSdkPath = run {
        val properties = java.util.Properties()
        file("local.properties").inputStream().use { properties.load(it) }
        val flutterSdkPath = properties.getProperty("flutter.sdk")
        require(flutterSdkPath != null) { "flutter.sdk not set in local.properties" }
        flutterSdkPath
    }

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id("dev.flutter.flutter-plugin-loader") version "1.0.0"
    id("com.android.application") version "8.1.0" apply false
    id("org.jetbrains.kotlin.android") version "1.9.0" apply false
}

include(":app")
EOF
          fi
          
          # Check if build.gradle.kts exists in root
          if [ ! -f android/build.gradle.kts ]; then
            echo "Creating build.gradle.kts..."
            cat > android/build.gradle.kts << 'EOF'
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

val newBuildDir: Directory = rootProject.layout.buildDirectory.dir("../../build").get()
rootProject.layout.buildDirectory.value(newBuildDir)

subprojects {
    val newSubprojectBuildDir: Directory = newBuildDir.dir(project.name)
    project.layout.buildDirectory.value(newSubprojectBuildDir)
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register<Delete>("clean") {
    delete(rootProject.layout.buildDirectory)
}
EOF
          fi
          
          # Check if app/build.gradle.kts exists
          if [ ! -f android/app/build.gradle.kts ]; then
            echo "Creating app/build.gradle.kts..."
            cat > android/app/build.gradle.kts << 'EOF'
plugins {
    id("com.android.application")
    id("kotlin-android")
    id("dev.flutter.flutter-gradle-plugin")
}

android {
    namespace = "com.velox.app"
    compileSdk = 34
    ndkVersion = "25.1.8937393"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId = "com.velox.app"
        minSdk = 21
        targetSdk = 34
        versionCode = 1
        versionName = "1.0.0"
    }

    buildTypes {
        release {
            isMinifyEnabled = false
            isShrinkResources = false
            signingConfig = signingConfigs.getByName("debug")
        }
    }
}

flutter {
    source = "../.."
}
EOF
          fi
          
          echo "Gradle configuration verified"

      - name: Download xterm.js assets
        run: |
          set -e
          mkdir -p assets/xterm
          curl -fL "https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" -o assets/xterm/xterm.js
          curl -fL "https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" -o assets/xterm/xterm.css
          if [ ! -f assets/xterm/xterm.js ] || [ ! -f assets/xterm/xterm.css ]; then
            echo "Error: xterm assets download failed"
            exit 1
          fi

      - name: Create Monaco assets directory
        run: |
          set -e
          mkdir -p assets/monaco
          echo "Monaco assets directory created"

      - run: flutter pub get

      - run: flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: velox-release
          path: build/app/outputs/flutter-apk/app-release.apk
